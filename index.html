<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>山东光伏情报站 | 动态类目情报看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1f8f4d;
      --primary-dark: #145f35;
      --primary-light: #e8f7ef;
      --bg-page: #f5f7fb;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --danger: #dc2626;
      --warning: #d97706;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .header {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.18), transparent 25%),
        linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
      padding: 34px 18px 28px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    .subtitle {
      opacity: .92;
      font-size: 14px;
    }

    .stats-bar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      font-size: 13px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px 18px 36px;
    }

    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, .04);
      margin-bottom: 18px;
    }

    .filter-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      border: 0;
      background: #f1f5f9;
      color: var(--text-secondary);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
      white-space: nowrap;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--primary);
      color: #fff;
    }

    .filter-btn .count {
      opacity: .75;
      font-weight: 800;
      margin-left: 4px;
    }

    .right-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box input {
      width: 280px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      outline: none;
      font-size: 14px;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(31, 143, 77, .12);
    }

    .search-box button,
    .small-btn {
      border: 0;
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .small-btn.today {
      background: #0f766e;
    }

    .small-btn.today.active {
      background: var(--warning);
    }

    .small-btn.ghost {
      background: #f1f5f9;
      color: var(--text-secondary);
    }

    .small-btn:hover {
      filter: brightness(.96);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--text-muted);
      font-size: 13px;
      margin: 12px 2px 18px;
      flex-wrap: wrap;
    }

    .active-filter {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 10px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 12px;
      font-weight: 800;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
    }

    .info-card {
      --category-color: var(--primary);
      --category-bg: var(--primary-light);

      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 5px solid var(--category-color);
      border-radius: 16px;
      padding: 18px;
      min-height: 252px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 22px rgba(15, 23, 42, .04);
      transition: transform .18s ease, box-shadow .18s ease;
      cursor: pointer;
    }

    .info-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(15, 23, 42, .08);
    }

    .card-category {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 10px;
      background: var(--category-bg);
      color: var(--category-color);
    }

    .card-title {
      font-size: 17px;
      line-height: 1.45;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .card-content {
      font-size: 14px;
      color: var(--text-secondary);
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      margin-bottom: 12px;
    }

    .card-meta {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .card-read-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      padding: 2px 0;
      transition: opacity .15s;
    }

    .card-read-link:hover {
      opacity: .72;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 26px;
      flex-wrap: wrap;
    }

    .page-btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 700;
    }

    .page-btn.active,
    .page-btn:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .page-btn:disabled {
      cursor: not-allowed;
      opacity: .5;
    }

    .loading,
    .empty-state,
    .error-state {
      text-align: center;
      padding: 60px 16px;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    .error-state {
      color: var(--danger);
      border-color: #fecaca;
      background: #fff7f7;
    }

    .empty-state h3,
    .error-state h3 {
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px 18px 36px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, .58);
      backdrop-filter: blur(3px);
      z-index: 1000;
      padding: 18px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      width: min(860px, 100%);
      max-height: 86vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 22px;
      padding: 26px;
      position: relative;
      box-shadow: 0 22px 70px rgba(15, 23, 42, .28);
    }

    .modal-close {
      position: absolute;
      right: 18px;
      top: 12px;
      font-size: 32px;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
    }

    .modal h3 {
      padding-right: 40px;
      font-size: 20px;
      line-height: 1.5;
    }

    .modal-body {
      margin-top: 16px;
      color: var(--text-secondary);
    }

    .modal-body p {
      margin: 10px 0;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .link-btn-primary {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 800;
      transition: background .18s;
    }

    .link-btn-primary:hover {
      background: var(--primary-dark);
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      transition: background .18s;
    }

    .link-btn:hover {
      background: #c8edda;
    }

    code {
      background: #f1f5f9;
      color: #334155;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 24px;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .filter-bar {
        align-items: stretch;
      }

      .filter-tabs,
      .right-actions,
      .search-box,
      .search-box input,
      .search-box button,
      .small-btn {
        width: 100%;
      }

      .filter-btn,
      .small-btn {
        justify-content: center;
      }

      .card-meta {
        flex-direction: column;
      }

      .modal-content {
        padding: 22px 18px;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <h1>☀️ 山东光伏情报站</h1>
    <div class="subtitle" id="subtitle">光伏政策 · 市场分析 · 项目信息｜每日自动更新｜多来源聚合</div>
    <div class="stats-bar" id="statsBar">
      <span>📋 数据加载中...</span>
    </div>
  </header>

  <main class="container">
    <section class="filter-bar">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-btn active" data-category="all">全部</button>
      </div>

      <div class="right-actions">
        <button id="todayBtn" class="small-btn today" type="button">今天最新采集</button>
        <button id="resetBtn" class="small-btn ghost" type="button">重置</button>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索标题、来源、摘要、类目..." />
          <button id="searchBtn" type="button">搜索</button>
        </div>
      </div>
    </section>

    <div class="summary-row">
      <div id="resultCount">共 0 条记录</div>
      <div class="active-filter" id="activeFilter"></div>
      <div id="lastUpdateTime">数据最后同步：--</div>
    </div>

    <section id="contentArea">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在加载数据...</p>
      </div>
    </section>

    <nav id="paginationArea" class="pagination"></nav>
  </main>

  <footer class="footer">
    <p>数据入口：百度搜索 + 指定官网 site 检索；点击卡片或「阅读原文」可直接访问原始页面。</p>
    <p>前端类目按钮已改为根据后端 JSON 自动生成：新增类目后无需再改 HTML。</p>
  </footer>

  <div id="detailModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <h3 id="modalTitle"></h3>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

<script>
  const DATA_URL = './data/shandong_pv_data.json';
  const PAGE_SIZE = 24;

  const FALLBACK_CATEGORY_TEXT = {
    policy: '光伏政策',
    market: '市场分析',
    project: '项目信息',
    source_grid_load_storage: '源网荷储'
  };

  const COLOR_POOL = [
    { color: '#0284c7', bg: '#e0f2fe' },
    { color: '#d97706', bg: '#fff7ed' },
    { color: '#7c3aed', bg: '#f3e8ff' },
    { color: '#0f766e', bg: '#ccfbf1' },
    { color: '#be123c', bg: '#ffe4e6' },
    { color: '#4338ca', bg: '#e0e7ff' },
    { color: '#15803d', bg: '#dcfce7' },
    { color: '#b45309', bg: '#fef3c7' },
    { color: '#0369a1', bg: '#e0f2fe' },
    { color: '#9333ea', bg: '#f3e8ff' }
  ];

  let allData = [];
  let meta = {
    generated_at: '',
    total: 0,
    category_stats: {},
    query_scope: {}
  };

  let categories = [];
  let currentCategory = 'all';
  let currentSearch = '';
  let currentPage = 1;
  let todayOnly = false;
  let loadError = '';

  async function loadData() {
    try {
      loadError = '';

      const res = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const json = await res.json();

      if (Array.isArray(json)) {
        allData = normalizeItems(json);
        meta = {
          generated_at: '',
          total: allData.length,
          category_stats: {},
          query_scope: {}
        };
      } else {
        allData = normalizeItems(Array.isArray(json.items) ? json.items : []);
        meta = {
          generated_at: json.generated_at || '',
          total: json.total || allData.length,
          category_stats: json.category_stats || {},
          query_scope: json.query_scope || {},
          date_rule: json.date_rule || {}
        };
      }

      sortAllData();
      categories = buildCategories();

      renderSubtitle();
      renderFilterTabs();
      updateStats();
      render();
    } catch (err) {
      console.error('数据加载失败：', err);
      loadError = err.message || String(err);
      allData = [];
      categories = [];
      meta = {
        generated_at: '',
        total: 0,
        category_stats: {},
        query_scope: {}
      };

      renderSubtitle();
      renderFilterTabs();
      updateStats();
      render();
    }
  }

  function normalizeItems(items) {
    return items.map((item, index) => {
      const category = item.category || 'uncategorized';
      return {
        ...item,
        id: item.id || makeItemId(item, index),
        category,
        category_label: item.category_label || getCategoryLabelFromMeta(category) || FALLBACK_CATEGORY_TEXT[category] || category
      };
    });
  }

  function makeItemId(item, index) {
    const raw = [item.title, item.original_url, item.publish_date, index].join('|');
    let hash = 0;
    for (let i = 0; i < raw.length; i++) {
      hash = ((hash << 5) - hash) + raw.charCodeAt(i);
      hash |= 0;
    }
    return 'auto_' + Math.abs(hash);
  }

  function sortAllData() {
    allData.sort((a, b) => {
      const publishDiff = getTimeValue(b.publish_date) - getTimeValue(a.publish_date);
      if (publishDiff !== 0) return publishDiff;

      const collectDiff = getTimeValue(b.collected_at) - getTimeValue(a.collected_at);
      if (collectDiff !== 0) return collectDiff;

      return String(b.title || '').localeCompare(String(a.title || ''), 'zh-CN');
    });
  }

  function buildCategories() {
    const result = [];
    const labelMap = {};
    const seen = new Set();

    const configCategories = meta.query_scope && meta.query_scope.query_config_categories
      ? meta.query_scope.query_config_categories
      : {};

    Object.entries(configCategories).forEach(([key, label]) => {
      addCategory(key, label);
    });

    Object.keys(meta.category_stats || {}).forEach(key => {
      const itemLabel = findItemCategoryLabel(key);
      addCategory(key, itemLabel || FALLBACK_CATEGORY_TEXT[key] || key);
    });

    allData.forEach(item => {
      addCategory(item.category || 'uncategorized', item.category_label || item.category || '未分类');
    });

    function addCategory(key, label) {
      if (!key) return;
      if (!seen.has(key)) {
        seen.add(key);
        labelMap[key] = label || FALLBACK_CATEGORY_TEXT[key] || key;
        result.push({
          key,
          label: labelMap[key],
          count: getCategoryCount(key)
        });
      } else if (label && (!labelMap[key] || labelMap[key] === key)) {
        labelMap[key] = label;
        const target = result.find(x => x.key === key);
        if (target) target.label = label;
      }
    }

    return result.map((cat, index) => ({
      ...cat,
      ...getCategoryColor(cat.key, index)
    }));
  }

  function getCategoryLabelFromMeta(category) {
    const configCategories = meta.query_scope && meta.query_scope.query_config_categories
      ? meta.query_scope.query_config_categories
      : {};

    return configCategories[category] || '';
  }

  function findItemCategoryLabel(category) {
    const target = allData.find(item => item.category === category && item.category_label);
    return target ? target.category_label : '';
  }

  function getCategoryCount(category) {
    const stats = meta.category_stats || {};
    if (typeof stats[category] === 'number') return stats[category];
    return allData.filter(item => item.category === category).length;
  }

  function getCategoryColor(category, index) {
    const fixed = {
      policy: { color: '#d97706', bg: '#fff7ed' },
      market: { color: '#0284c7', bg: '#e0f2fe' },
      project: { color: '#7c3aed', bg: '#f3e8ff' },
      source_grid_load_storage: { color: '#0f766e', bg: '#ccfbf1' }
    };

    if (fixed[category]) return fixed[category];

    return COLOR_POOL[index % COLOR_POOL.length];
  }

  function renderSubtitle() {
    const subtitle = document.getElementById('subtitle');
    if (!subtitle) return;

    const labels = categories.map(x => x.label).filter(Boolean);
    if (labels.length) {
      subtitle.innerText = labels.join(' · ') + '｜每日自动更新｜多来源聚合';
    } else {
      subtitle.innerText = '光伏政策 · 市场分析 · 项目信息｜每日自动更新｜多来源聚合';
    }
  }

  function renderFilterTabs() {
    const box = document.getElementById('filterTabs');

    const buttons = [
      `<button class="filter-btn ${currentCategory === 'all' ? 'active' : ''}" data-category="all">
        全部 <span class="count">${allData.length}</span>
      </button>`
    ];

    categories.forEach(cat => {
      buttons.push(`
        <button class="filter-btn ${currentCategory === cat.key ? 'active' : ''}" data-category="${escapeHtml(cat.key)}">
          ${escapeHtml(cat.label)}
          <span class="count">${cat.count}</span>
        </button>
      `);
    });

    box.innerHTML = buttons.join('');

    box.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCategory = btn.getAttribute('data-category') || 'all';
        currentPage = 1;
        renderFilterTabs();
        updateActiveButtons();
        render();
      });
    });
  }

  function updateStats() {
    const today = getBeijingToday();
    const todayCount = allData.filter(item => isTodayCollected(item, today)).length;

    const statsHtml = [
      `<span>📋 总量：${allData.length} 条</span>`,
      `<span>🆕 今日采集：${todayCount} 条</span>`
    ];

    categories.forEach(cat => {
      statsHtml.push(`<span>${getCategoryIcon(cat.key)} ${escapeHtml(cat.label)}：${cat.count}</span>`);
    });

    document.getElementById('statsBar').innerHTML = statsHtml.join('');

    const d = meta.generated_at ? new Date(meta.generated_at) : null;
    document.getElementById('lastUpdateTime').innerText =
      '数据最后同步：' + (d && !isNaN(d.getTime()) ? d.toLocaleString('zh-CN') : '等待首次爬虫生成');
  }

  function getCategoryIcon(category) {
    const icons = {
      policy: '📘',
      market: '📈',
      project: '📦',
      source_grid_load_storage: '🔋'
    };
    return icons[category] || '🏷️';
  }

  function filteredData() {
    let data = [...allData];

    if (currentCategory !== 'all') {
      data = data.filter(item => item.category === currentCategory);
    }

    if (todayOnly) {
      const today = getBeijingToday();
      data = data.filter(item => isTodayCollected(item, today));
      data.sort((a, b) => {
        const collectDiff = getTimeValue(b.collected_at) - getTimeValue(a.collected_at);
        if (collectDiff !== 0) return collectDiff;
        return getTimeValue(b.publish_date) - getTimeValue(a.publish_date);
      });
    }

    const kw = currentSearch.trim().toLowerCase();
    if (kw) {
      data = data.filter(item => {
        return [
          item.title,
          item.content,
          item.source,
          item.category,
          item.category_label,
          item.publish_date,
          item.collected_at,
          item.matched_query
        ].some(value => String(value || '').toLowerCase().includes(kw));
      });
    }

    return data;
  }

  function render() {
    updateActiveButtons();

    if (loadError) {
      document.getElementById('resultCount').innerText = '共 0 条记录';
      document.getElementById('activeFilter').innerHTML = '';
      document.getElementById('paginationArea').innerHTML = '';
      document.getElementById('contentArea').innerHTML = `
        <div class="error-state">
          <h3>数据加载失败</h3>
          <p>请确认 <code>${escapeHtml(DATA_URL)}</code> 是否存在，或通过本地 HTTP 服务打开页面。</p>
          <p>错误信息：${escapeHtml(loadError)}</p>
        </div>
      `;
      return;
    }

    const data = filteredData();
    const total = data.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = data.slice(start, start + PAGE_SIZE);

    document.getElementById('resultCount').innerText =
      `共 ${total} 条记录，第 ${currentPage}/${totalPages} 页，每页 ${PAGE_SIZE} 条`;

    renderActiveFilter();

    const content = document.getElementById('contentArea');

    if (!pageData.length) {
      content.innerHTML = emptyStateHtml();
      document.getElementById('paginationArea').innerHTML = '';
      return;
    }

    content.innerHTML = `<div class="cards-grid">${pageData.map(item => cardHtml(item)).join('')}</div>`;

    document.querySelectorAll('.info-card').forEach(card => {
      card.addEventListener('click', event => {
        if (event.target.closest('a')) return;

        const id = card.getAttribute('data-id');
        const item = allData.find(x => String(x.id) === String(id));

        if (item) showDetail(item);
      });
    });

    renderPagination(totalPages);
  }

  function renderActiveFilter() {
    const box = document.getElementById('activeFilter');
    const tags = [];

    if (currentCategory !== 'all') {
      const cat = categories.find(x => x.key === currentCategory);
      tags.push(`<span class="tag">类目：${escapeHtml(cat ? cat.label : currentCategory)}</span>`);
    }

    if (todayOnly) {
      tags.push(`<span class="tag">今天采集：${escapeHtml(getBeijingToday())}</span>`);
    }

    if (currentSearch.trim()) {
      tags.push(`<span class="tag">搜索：${escapeHtml(currentSearch.trim())}</span>`);
    }

    box.innerHTML = tags.join('');
  }

  function emptyStateHtml() {
    if (todayOnly) {
      return `
        <div class="empty-state">
          <h3>今天暂无新采集数据</h3>
          <p>当前筛选日期：<code>${escapeHtml(getBeijingToday())}</code></p>
          <p>可点击「显示全部数据」或「重置」查看历史数据。</p>
        </div>
      `;
    }

    if (currentSearch.trim() || currentCategory !== 'all') {
      return `
        <div class="empty-state">
          <h3>没有匹配的数据</h3>
          <p>可以尝试更换关键词、切换类目，或点击「重置」。</p>
        </div>
      `;
    }

    return `
      <div class="empty-state">
        <h3>暂无数据</h3>
        <p>请先在本地或 GitHub Actions 中运行爬虫：</p>
        <p><code>python crawler.py --overwrite --debug --limit-queries 3</code></p>
      </div>
    `;
  }

  function cardHtml(item) {
    const category = item.category || 'uncategorized';
    const cat = categories.find(x => x.key === category) || {
      label: item.category_label || FALLBACK_CATEGORY_TEXT[category] || category,
      color: '#1f8f4d',
      bg: '#e8f7ef'
    };

    const origUrl = safeUrl(item.original_url || '');
    const readLink = origUrl
      ? `<a class="card-read-link" href="${escapeHtml(origUrl)}" target="_blank" rel="noopener noreferrer" title="直接访问原文页面">🔗 阅读原文</a>`
      : '';

    return `
      <article
        class="info-card"
        data-id="${escapeHtml(item.id)}"
        style="--category-color:${cat.color};--category-bg:${cat.bg};"
      >
        <div class="card-category">${escapeHtml(item.category_label || cat.label)}</div>
        <div class="card-title">${escapeHtml(item.title || '未命名标题')}</div>
        <div class="card-content">${escapeHtml(item.content || '暂无摘要')}</div>
        <div class="card-meta">
          <span>📅 发布：${escapeHtml(item.publish_date || '未知日期')}</span>
          <span>⏱️ 采集：${escapeHtml(formatCollectedTime(item.collected_at))}</span>
          <span>📌 ${escapeHtml(item.source || '未知来源')}</span>
          ${readLink}
        </div>
      </article>
    `;
  }

  function renderPagination(totalPages) {
    const box = document.getElementById('paginationArea');

    if (totalPages <= 1) {
      box.innerHTML = '';
      return;
    }

    const pages = [];
    pages.push({
      text: '上一页',
      page: Math.max(1, currentPage - 1),
      disabled: currentPage === 1
    });

    const start = Math.max(1, currentPage - 3);
    const end = Math.min(totalPages, start + 6);

    for (let i = start; i <= end; i++) {
      pages.push({
        text: String(i),
        page: i,
        active: i === currentPage
      });
    }

    pages.push({
      text: '下一页',
      page: Math.min(totalPages, currentPage + 1),
      disabled: currentPage === totalPages
    });

    box.innerHTML = pages.map(p => `
      <button
        class="page-btn ${p.active ? 'active' : ''}"
        ${p.disabled ? 'disabled' : ''}
        data-page="${p.page}"
      >
        ${p.text}
      </button>
    `).join('');

    box.querySelectorAll('.page-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;

        currentPage = Number(btn.getAttribute('data-page'));
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function showDetail(item) {
    const category = item.category || 'uncategorized';
    const cat = categories.find(x => x.key === category);
    const categoryLabel = item.category_label || (cat ? cat.label : FALLBACK_CATEGORY_TEXT[category]) || category;

    document.getElementById('modalTitle').innerText = item.title || '';

    const origUrl = safeUrl(item.original_url || '');
    const baidu = safeUrl(item.baidu_search_url || ('https://www.baidu.com/s?wd=' + encodeURIComponent(item.title || '')));
    const home = safeUrl(item.homepage_url || ('https://www.baidu.com/s?wd=' + encodeURIComponent(item.source || '')));

    const primaryBtn = origUrl
      ? `<a class="link-btn-primary" href="${escapeHtml(origUrl)}" target="_blank" rel="noopener noreferrer">📄 阅读原文</a>`
      : '';

    const baiduBtn = baidu
      ? `<a class="link-btn" href="${escapeHtml(baidu)}" target="_blank" rel="noopener noreferrer">🔍 百度搜索标题</a>`
      : '';

    const homeBtn = home
      ? `<a class="link-btn" href="${escapeHtml(home)}" target="_blank" rel="noopener noreferrer">🏠 访问官网主页</a>`
      : '';

    document.getElementById('modalBody').innerHTML = `
      <p><strong>分类：</strong>${escapeHtml(categoryLabel)}</p>
      <p><strong>发布日期：</strong>${escapeHtml(item.publish_date || '未知日期')}</p>
      <p><strong>采集时间：</strong>${escapeHtml(formatCollectedTime(item.collected_at))}</p>
      <p><strong>来源：</strong>${escapeHtml(item.source || '未知来源')}</p>
      <p><strong>匹配查询：</strong>${escapeHtml(item.matched_query || '无')}</p>
      <p><strong>内容概述：</strong><br>${escapeHtml(item.content || '暂无摘要')}</p>
      <div class="btn-group">
        ${primaryBtn}
        ${baiduBtn}
        ${homeBtn}
      </div>
    `;

    document.getElementById('detailModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
  }

  function bindEvents() {
    document.getElementById('todayBtn').addEventListener('click', () => {
      todayOnly = !todayOnly;
      currentPage = 1;
      render();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      currentCategory = 'all';
      currentSearch = '';
      todayOnly = false;
      currentPage = 1;
      document.getElementById('searchInput').value = '';
      renderFilterTabs();
      updateActiveButtons();
      render();
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      currentSearch = document.getElementById('searchInput').value;
      currentPage = 1;
      render();
    });

    document.getElementById('searchInput').addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        currentSearch = event.target.value;
        currentPage = 1;
        render();
      }
    });

    window.addEventListener('click', event => {
      if (event.target === document.getElementById('detailModal')) {
        closeModal();
      }
    });

    window.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeModal();
      }
    });
  }

  function updateActiveButtons() {
    const todayBtn = document.getElementById('todayBtn');
    todayBtn.classList.toggle('active', todayOnly);
    todayBtn.innerText = todayOnly ? '显示全部数据' : '今天最新采集';
  }

  function isTodayCollected(item, today) {
    const collectedDate = dateOnly(item.collected_at);
    return collectedDate === today;
  }

  function getBeijingToday() {
    return formatDateInTimezone(new Date(), 'Asia/Shanghai');
  }

  function formatDateInTimezone(date, timeZone) {
    const parts = new Intl.DateTimeFormat('zh-CN', {
      timeZone,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).formatToParts(date);

    const map = {};
    parts.forEach(part => {
      map[part.type] = part.value;
    });

    return `${map.year}-${map.month}-${map.day}`;
  }

  function dateOnly(value) {
    if (!value) return '';

    const str = String(value).trim();

    const standard = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (standard) return `${standard[1]}-${standard[2]}-${standard[3]}`;

    const cn = str.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if (cn) {
      return `${cn[1]}-${pad2(cn[2])}-${pad2(cn[3])}`;
    }

    const parsed = new Date(str);
    if (!isNaN(parsed.getTime())) {
      return formatDateInTimezone(parsed, 'Asia/Shanghai');
    }

    return '';
  }

  function getTimeValue(value) {
    if (!value) return 0;

    const str = String(value).trim();

    const cn = str.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if (cn) {
      return new Date(`${cn[1]}-${pad2(cn[2])}-${pad2(cn[3])}T00:00:00+08:00`).getTime();
    }

    const standardDate = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (standardDate) {
      return new Date(`${str}T00:00:00+08:00`).getTime();
    }

    const parsed = new Date(str);
    return isNaN(parsed.getTime()) ? 0 : parsed.getTime();
  }

  function formatCollectedTime(value) {
    if (!value) return '未知时间';

    const parsed = new Date(value);
    if (!isNaN(parsed.getTime())) {
      return parsed.toLocaleString('zh-CN');
    }

    return String(value);
  }

  function pad2(value) {
    return String(value).padStart(2, '0');
  }

  function safeUrl(url) {
    if (!url) return '';

    try {
      const parsed = new URL(url, window.location.href);
      if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
        return parsed.href;
      }
    } catch (err) {
      return '';
    }

    return '';
  }

  function escapeHtml(str) {
    return String(str || '').replace(/[&<>'"]/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    }[char]));
  }

  bindEvents();
  loadData();
</script>
</body>
</html>
