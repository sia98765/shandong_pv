name: Shandong PV Baidu Crawler

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawler:
    runs-on: ubuntu-24.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage beautifulsoup4 lxml requests

      - name: 安装 Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 检查 Chrome
        run: |
          which google-chrome || true
          google-chrome --version || true

      - name: 使用虚拟窗口运行百度检索脚本
        run: |
          xvfb-run -a -s "-screen 0 1366x900x24" python crawler.py \
            --overwrite \
            --no-file-log \
            --no-detail-logs \
            --limit-queries 0 \
            --max-pages-per-query 1 \
            --query-sleep-min 20 \
            --query-sleep-max 35 \
            --page-sleep-min 3 \
            --page-sleep-max 8 \
            --after-load-sleep 3

      - name: 提交采集结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/shandong_pv_data.json data/meta.json
          git commit -m "update shandong pv data" || echo "没有数据变化"
          git push