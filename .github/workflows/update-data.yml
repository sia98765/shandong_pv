name: 山东光伏情报站 - 本机自动采集

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  crawler:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 检查 Python
        shell: cmd
        run: |
          python --version
          pip --version

      - name: 安装 Python 依赖
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行采集脚本
        shell: cmd
        run: |
          python crawler.py ^
            --search-mode rss ^
            --no-file-log ^
            --no-detail-logs ^
            --limit-queries 0 ^
            --max-pages-per-query 2 ^
            --query-sleep-min 5 ^
            --query-sleep-max 10 ^
            --page-sleep-min 2 ^
            --page-sleep-max 5

      - name: 提交采集结果
        shell: cmd
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/shandong_pv_data.json data/meta.json
          git commit -m "update shandong pv data" || echo 没有数据变化
          git push