name: 山东光伏情报站 - 本机百度低频采集

on:
  workflow_dispatch:
  schedule:
    - cron: "2 4 * * *"    # 北京时间 12:00
    - cron: "2 16 * * *"   # 北京时间 00:02

permissions:
  contents: write

concurrency:
  group: shandong-pv-crawler
  cancel-in-progress: false

jobs:
  crawler:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 360

    env:
      BAIDU_PROFILE_DIR: "C:\\Users\\Administrator\\actions-runner\\chrome_profiles\\baidu"
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false

      - name: Add Git to PATH
        shell: powershell
        run: |
          chcp 65001

          $gitPaths = @(
            "C:\Program Files\Git\cmd",
            "C:\Program Files (x86)\Git\cmd"
          )

          $gitDir = $null

          foreach ($p in $gitPaths) {
            if (Test-Path "$p\git.exe") {
              $gitDir = $p
              break
            }
          }

          if (-not $gitDir) {
            throw "Git not found. Please install Git for Windows."
          }

          Add-Content -Path $env:GITHUB_PATH -Value $gitDir
          $env:Path = "$gitDir;$env:Path"

          Write-Host "Git path added: $gitDir"
          git --version

      - name: Check runtime environment
        shell: powershell
        run: |
          chcp 65001

          Write-Host "RUNNER_NAME=$env:RUNNER_NAME"
          Write-Host "RUNNER_OS=$env:RUNNER_OS"
          Write-Host "COMPUTERNAME=$env:COMPUTERNAME"
          Write-Host "BAIDU_PROFILE_DIR=$env:BAIDU_PROFILE_DIR"

          python --version
          python -m pip --version
          git --version

          Write-Host "Git proxy config:"
          $httpProxy = git config --global --get http.proxy
          if ($LASTEXITCODE -ne 0) {
            $httpProxy = ""
          }

          $httpsProxy = git config --global --get https.proxy
          if ($LASTEXITCODE -ne 0) {
            $httpsProxy = ""
          }

          Write-Host "http.proxy=$httpProxy"
          Write-Host "https.proxy=$httpsProxy"

      - name: Create required directories
        shell: powershell
        run: |
          chcp 65001

          New-Item -ItemType Directory -Force -Path "data" | Out-Null
          New-Item -ItemType Directory -Force -Path "logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "logs\blocked_pages" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:BAIDU_PROFILE_DIR" | Out-Null

          Write-Host "Directories ready."

      - name: Clean browser processes
        shell: powershell
        run: |
          chcp 65001

          Write-Host "Stopping remaining chrome/msedge processes..."
          Get-Process chrome,msedge -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

          Start-Sleep -Seconds 3

          Write-Host "Cleaning Chrome profile lock files..."
          Remove-Item "$env:BAIDU_PROFILE_DIR\Singleton*" -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:BAIDU_PROFILE_DIR\lockfile" -Force -ErrorAction SilentlyContinue

          Write-Host "Browser cleanup done."

      - name: Install Python dependencies
        shell: powershell
        run: |
          chcp 65001

          python -m pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com
          python -m pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com --no-cache-dir

      - name: Run crawler
        shell: powershell
        run: |
          chcp 65001

          python crawler.py `
            --no-file-log `
            --no-detail-logs `
            --limit-queries 0 `
            --max-pages-per-query 3 `
            --query-sleep-min 90 `
            --query-sleep-max 180 `
            --page-sleep-min 10 `
            --page-sleep-max 20 `
            --after-load-sleep 5 `
            --restart-browser-every 1 `
            --restart-sleep 60

      - name: Commit crawler results
        shell: powershell
        run: |
          chcp 65001

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status

          git add data/shandong_pv_data.json data/meta.json logs/blocked_pages

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit."
          } else {
            git commit -m "update shandong pv data"
            git push
          }
